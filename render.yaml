services:
  - type: web
    name: life-rpg-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: VITE_GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: "*"
